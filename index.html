<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Генератор гербов</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap"
    />
    <style>
      :root {
        --color-blue: #6300ff;
        --color-crimson: #e8232a;
        --color-deepskyblue: #00c3ff;
        --color-fuchsia: #ff00ed;
        --color-gainsboro: #d9d9d9;
        --color-lime: #00ff06;
        --color-orange: #f5a31b;
        --color-yellow: #ffff00;
        --First-View-Color: #2b5be0;
        --Mobile-Toolbar: #3d3d3d;
        --Next-Past: #757575;
        --Secondary-Elements: #efefef;
        --Sidebar-color: #fff;
        --Toolbars-Color: #000;
        --accent-color: #2b5be0;
        --shadow-drop: 0px 0px 5.9px rgba(0, 0, 0, 0.2);
        --font-inter: Inter, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

body {
    margin: 0;
    line-height: normal;
    font-family: var(--font-inter);
    color: var(--Toolbars-Color);
    background: var(--Sidebar-color);
    /* Добавляем блокировку скролла */
    height: 100vh;
    overflow: hidden;
}

      #app {
        min-height: 100vh;
      }

      .accent-fill,
      .coat-layer svg .accent-fill {
        fill: var(--accent-color);
      }

      .accent-stroke,
      .coat-layer svg .accent-stroke {
        stroke: var(--accent-color);
      }

      .coat-layer svg .keep-white {
        fill: #fff;
      }

      /* ——— Desktop ——— */
      #desktop-layout {
        display: none;
        flex-wrap: wrap;
        align-items: flex-start;
        min-height: 100vh;
      }

      @media (min-width: 768px) {
        #desktop-layout {
          display: flex;
        }
        #mobile-layout {
          display: none !important;
        }
      }

#sidebar {
    width: 619px;
    max-width: 100%;
    height: 1662px;
    overflow-y: auto;
    flex-shrink: 0;
    padding: 88px 3px 80px 26px;
    display: flex;
    flex-direction: column;
    gap: 40.5px;
    background: var(--Sidebar-color);
    
    /* Добавляем магию зума: */
    zoom: 0.55; 
}

      .section-title {
        margin: 0;
        font-size: 40px;
        font-weight: 500;
        letter-spacing: -0.05em;
        text-align: center;
        width: 100%;
      }

      .section-block {
        display: flex;
        flex-direction: column;
        gap: 17px;
        width: 100%;
        max-width: 568px;
      }

      /* Щиты */
      .shield-picker {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 17px;
      }

      .shield-icons {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 512px;
        padding: 0 11px 0 10px;
      }

      .shield-option {
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .shield-option .shield-thumb {
        width: 76.5px;
        height: 107.5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .shield-option .shield-thumb svg {
        width: 100%;
        height: 100%;
      }

      .shield-option span {
        font-size: 22px;
        font-weight: 200;
        letter-spacing: -0.05em;
        width: 98px;
        text-align: center;
      }

      .shield-option.active span {
        font-weight: 600;
      }

      /* Цвета */
      .color-section {
        display: flex;
        flex-direction: column;
        gap: 42px;
        align-items: center;
      }

      .color-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 17px 17.5px;
        width: 100%;
        max-width: 520px;
        justify-content: center;
      }

      .color-swatch {
        width: 91px;
        height: 92px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        position: relative;
      }

      .color-swatch.active::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 3px solid var(--Toolbars-Color);
      }

      .color-swatch.picker {
        background: conic-gradient(
          #e8232a,
          #f5a31b,
          #ffff00,
          #00ff06,
          #00c3ff,
          #6300ff,
          #e8232a
        );
      }

      #color-input {
        position: absolute;
        width: 0;
        height: 0;
        opacity: 0;
        pointer-events: none;
      }

      /* Полоски */
      .stripes-section {
        display: flex;
        flex-direction: column;
        gap: 16.5px;
        align-items: center;
      }

      .stripe-counts {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 512px;
        padding: 0 29px 0 31px;
      }

      .stripe-count {
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 22px;
        letter-spacing: -0.05em;
        font-weight: 200;
        font-family: inherit;
        color: inherit;
        width: 98px;
        text-align: center;
        padding: 0;
      }

      .stripe-count.active {
        font-weight: 600;
      }

      .stripe-previews {
        display: flex;
        width: 100%;
        max-width: 568px;
        gap: 0;
      }

      .stripe-preview {
        flex: 1;
        height: 30px;
        min-width: 129px;
        max-width: 140px;
        box-shadow: var(--shadow-drop);
        cursor: pointer;
        border: none;
        padding: 0;
      }

      /* Животные */
      .animals-section {
        display: flex;
        flex-direction: column;
        gap: 44px;
        align-items: center;
        width: 100%;
      }

      .animal-row {
        display: flex;
        justify-content: space-between;
        width: 512px;
        max-width: 100%;
        gap: 20px;
      }

      .animal-row.tight {
        gap: 13px;
        flex-direction: column;
        align-items: flex-end;
      }

      .animal-row-inner {
        display: flex;
        justify-content: space-between;
        width: 100%;
      }

      .animal-row.labels {
        width: 500px;
      }

      .animal-row.pair {
        width: 315px;
      }

      .animal-option {
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .animal-option .animal-thumb {
        width: 109px;
        height: 123px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .animal-option .animal-thumb svg {
        max-width: 100%;
        max-height: 100%;
      }

      .animal-option span {
        font-size: 22px;
        font-weight: 200;
        letter-spacing: -0.05em;
        width: 98px;
        text-align: center;
        height: 28px;
        line-height: 28px;
      }

      .animal-option.active span {
        font-weight: 600;
      }

      /* Текст */
      .text-section {
        display: flex;
        flex-direction: column;
        gap: 35px;
        align-items: center;
        padding-bottom: 55.5px;
      }

      .text-input-wrap {
        width: 100%;
        max-width: 564px;
        border-radius: 26px;
        background: var(--Secondary-Elements);
        padding: 13px 20px 69px;
      }

      .text-input-wrap input {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--font-inter);
        font-size: 36px;
        font-weight: 300;
        letter-spacing: -0.05em;
        color: var(--Toolbars-Color);
        outline: none;
      }

      .text-input-wrap input::placeholder {
        color: var(--Toolbars-Color);
        opacity: 0.5;
      }

      /* Кнопки */
      .action-buttons {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 566px;
        padding-left: 1px;
        gap: 20px;
        margin-bottom: 16px;
      }

      .btn-random,
      .btn-svg {
        border: none;
        background: transparent;
        cursor: pointer;
        font-family: var(--font-inter);
        font-size: 34px;
        font-weight: 300;
        letter-spacing: -0.05em;
        color: var(--Toolbars-Color);
        width: 195px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0;
      }

      .btn-svg svg {
        width: 15px;
        height: 26px;
      }

      /* Основная область */
/* 1. Наш монолитный синий экран */
#main-area {
    flex: 1;
    background-color: var(--accent-color);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. Бронированный контейнер герба */
#coat-of-arms {
    position: relative; /* ВОТ ЭТО возвращает все слои на место! */
    width: 616px;
    height: 788px;
    flex-shrink: 0; /* Запрещаем гербу сплющиваться */
}

      .coat-layer {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #shield-layer {
        z-index: 1;
        filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.3));
      }

      #shield-layer svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      #stripes-layer {
        z-index: 2;
        display: flex;
        align-items: flex-start;
        height: auto !important;
        top: 6%;
        width: 79%;
    left: 10.4%;
      }

      #stripes-layer svg {
        width: 100%;
        height: 30px;
        display: block;
      }

      #animal-layer {
        z-index: 3;
        width: 410px;
        height: 463px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -42%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #animal-layer svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #text-layer {
        z-index: 4;
        width: 610px;
        height: 170px;
        left: 100px;
        bottom: 0;
        display: flex;
        align-items: flex-start;
        font-size: 93px;
        font-weight: 500;
        letter-spacing: -0.1em;
        line-height: 1;
        color: var(--accent-color);
        word-break: break-word;
        overflow: hidden;
        top: 90px;
      }

      /* ——— Mobile ——— */
      #mobile-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: var(--Sidebar-color);
      }

      @media (max-width: 767px) {
        #mobile-layout {
          display: flex;
        }
      }

      #mobile-main-area {
        background-color: var(--accent-color);
        padding: 334px 187px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      @media (max-width: 450px) {
        #mobile-main-area {
          padding: 141px 20px;
        }
      }

     /* ——— Mobile ——— */
/* ——— Mobile ——— */
      
      /* 1. Жестко фиксируем экран, чтобы победить баг Safari на iOS */
      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed; /* Это не даст экрану "прыгать" и прятать меню */
        top: 0;
        left: 0;
      }

      #mobile-layout {
        display: none;
        flex-direction: column;
        width: 100%;
        height: 100%;
        background: var(--Sidebar-color);
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      @media (max-width: 768px) {
        #mobile-layout {
          display: flex !important;
        }
        #desktop-layout {
          display: none !important;
        }
      }

      /* 2. Синяя область занимает только то место, что осталось НАД меню */
      #mobile-main-area {
        background-color: var(--accent-color);
        padding: 0; /* Убрали огромные отступы, которые всё ломали */
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      /* 3. Делаем мобильный герб ТОЧНО ТАКИМ ЖЕ, как десктопный, и сжимаем через transform */
      #mobile-coat-of-arms {
        position: relative;
        width: 616px;
        height: 788px;
        transform-origin: center;
        transform: scale(0.45); /* Базовый масштаб для небольших экранов */
        flex-shrink: 0;
      }

      @media (min-height: 700px) {
        #mobile-coat-of-arms {
          transform: scale(0.55); /* Для экранов побольше делаем герб крупнее */
        }
      }

#mobile-coat-of-arms .coat-layer {
    position: absolute;
    /* left: 0; */
    /* top: 0; */
    /* width: 100%; */
    /* height: 100%; */
    pointer-events: none;
}


      #mobile-shield-layer {
        z-index: 1;
        filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.3));
      }

      #mobile-shield-layer svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      #mobile-stripes-layer {
        z-index: 2;
        display: flex;
        align-items: flex-start;
        height: auto !important;
        top: 6%;
        width: 79%;
        left: 10.4%;
      }

      #mobile-stripes-layer svg {
        width: 100%;
        height: 30px;
        display: block;
      }

#mobile-animal-layer {
    z-index: 3;
    width: 444px;    /* Эти строки оставляем обязательно! */
    height: 491px;   /* Они держат размер льва в рамках щита */
    left: 14%;
    top: 23%;
    display: flex;
    align-items: center;
    justify-content: center;
}

      #mobile-animal-layer svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #mobile-text-layer {
        z-index: 4;
        width: 610px;
        height: 170px;
        left: 100px;
        top: 84px;
        display: flex;
        align-items: flex-start;
        font-size: 100px;
        font-weight: 500;
        letter-spacing: -0.1em;
        line-height: 1;
        color: var(--accent-color);
        word-break: break-word;
        overflow: hidden;
      }

#stripe-indicator {
    display: flex;
    justify-content: center; /* ВОТ ЭТА СТРОЧКА ВЫЛЕЧИТ КНОПКУ 2 */
    width: 100%;
    max-width: 762px;
    height: 21px;
    margin: 0 auto;
}

      #stripe-indicator .ind-seg {
        flex: 1;
        height: 21px;
        min-width: 100px;
        max-width: 2000px;
      }

      #stripe-indicator .ind-seg.white {
        background: var(--Sidebar-color);
      }

      #stripe-indicator .ind-seg.accent {
        background: var(--accent-color);
      }

      #bottom-bar {
        width: 100%;
        max-width: 762px;
        margin: 0 auto;
        background: var(--Sidebar-color);
        flex-shrink: 0;
      }

.mobile-panel {
        padding: 20px 20px 30px; /* Сильно уменьшили отступы */
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 20px; /* Расстояние между заголовком и иконками */
      }

      .mobile-panel.active {
        display: flex;
      }

      .mobile-panel .section-title {
        color: var(--Mobile-Toolbar);
        font-size: 24px; /* Уменьшили шрифт заголовка */
        padding: 0;
        text-align: center;
      }

      /* Mobile щиты */
      .mobile-shield-icons {
        display: flex;
        gap: 30px; /* Сузили расстояние между щитами */
        justify-content: center;
        align-items: flex-start;
      }

      .mobile-shield-option .shield-thumb {
        width: 55px; /* Пропорционально уменьшили иконки */
        height: 78px;
      }

      .mobile-shield-option span {
        font-size: 16px;
        width: 100%;
        text-align: center;
      }

      /* Mobile цвета */
      .mobile-color-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        max-width: 320px;
      }

      .mobile-color-grid .color-swatch {
        width: 55px;
        height: 55px;
      }

      /* Mobile полоски */
      .mobile-stripe-counts {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 300px;
        padding: 0;
      }

      .mobile-stripe-counts .stripe-count {
        width: 80px;
        font-size: 18px;
      }

      .mobile-stripe-previews {
        display: flex;
        width: 100%;
        max-width: 400px;
      }

      .mobile-stripe-previews .stripe-preview {
        height: 24px;
        min-width: 100px;
      }

      /* Mobile животные */
      .mobile-animals-scroll {
        display: flex;
        align-items: center;
        gap: 20px;
        width: 100%;
        justify-content: center;
        position: relative;
      }

      .mobile-animal-nav {
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 8px;
        flex-shrink: 0;
      }

      .mobile-animal-nav svg {
        width: 12px;
        height: 20px;
      }

      .mobile-animal-grid {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 320px;
      }

      .mobile-animal-grid .animal-thumb {
        width: 70px;
        height: 80px;
      }
      
      .mobile-animal-option span {
          font-size: 16px;
      }

      /* Mobile текст */
      .mobile-text-input-wrap {
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
        background: var(--Secondary-Elements);
        padding: 10px 20px 20px;
      }

      .mobile-text-input-wrap input {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--font-inter);
        font-size: 24px;
        font-weight: 300;
        letter-spacing: -0.05em;
        outline: none;
        text-align: center;
      }

      /* Навигация (Предыдущий / Следующий) */
      .bottom-nav {
        background: var(--Secondary-Elements);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between; /* Раскидываем кнопки по краям */
        width: 100%;
        margin: 0 auto;
      }

      .nav-btn {
        border: none;
        background: transparent;
        cursor: pointer;
        font-family: var(--font-inter);
        font-size: 16px;
        font-weight: 500;
        letter-spacing: -0.05em;
        color: var(--Next-Past);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0;
      }

      .nav-btn svg {
        width: 10px;
        height: 18px;
        flex-shrink: 0;
      }

      .nav-btn.prev svg {
        transform: rotate(-90deg);
      }

      .nav-btn.next svg {
        transform: rotate(90deg);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Desktop -->
      <div id="desktop-layout">
        <aside id="sidebar">
          <h2 class="section-title">Форма щита</h2>
          <div class="section-block shield-picker">
            <div class="shield-icons" id="desktop-shields"></div>
          </div>

          <section class="section-block color-section">
            <h2 class="section-title">Цвет</h2>
            <div class="color-grid" id="desktop-colors"></div>
            <input type="color" id="color-input" value="#2b5be0" aria-hidden="true" tabindex="-1" />
          </section>

          <section class="section-block stripes-section">
            <h2 class="section-title">Полоски</h2>
            <div class="stripe-counts" id="desktop-stripe-counts">
              <button type="button" class="stripe-count active" data-stripes="2">2</button>
              <button type="button" class="stripe-count" data-stripes="4">4</button>
              <button type="button" class="stripe-count" data-stripes="6">6</button>
            </div>
            <div class="stripe-previews" id="desktop-stripe-previews"></div>
          </section>

          <section class="section-block animals-section" id="desktop-animals"></section>

          <section class="section-block text-section">
            <h2 class="section-title">Текст</h2>
            <label class="text-input-wrap">
              <input type="text" id="desktop-text-input" maxlength="20" value="Фрейм" aria-label="Текст герба" />
            </label>
          </section>

          <div class="action-buttons">
            <button type="button" class="btn-random" id="btn-random">Случайный</button>
            <button type="button" class="btn-svg" id="btn-svg">
              SVG
              <svg viewBox="0 0 15 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M6.65715 25.7071C7.04767 26.0976 7.68084 26.0976 8.07136 25.7071L14.4353 19.3431C14.8258 18.9526 14.8258 18.3195 14.4353 17.9289C14.0448 17.5384 13.4116 17.5384 13.0211 17.9289L7.36426 23.5858L1.7074 17.9289C1.31688 17.5384 0.683714 17.5384 0.293189 17.9289C-0.0973352 18.3195 -0.0973352 18.9526 0.293189 19.3431L6.65715 25.7071ZM7.36426 0L6.36426 0L6.36426 25L7.36426 25L8.36426 25L8.36426 0L7.36426 0Z" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </aside>

        <main id="main-area">
          <div id="coat-of-arms">
            <div id="shield-layer" class="coat-layer"></div>
            <div id="stripes-layer" class="coat-layer"></div>
            <div id="animal-layer" class="coat-layer"></div>
            <div id="text-layer" class="coat-layer">Фрейм</div>
          </div>
        </main>
      </div>

      <!-- Mobile -->
      <div id="mobile-layout">
        <div id="mobile-main-area">
          <div id="mobile-coat-of-arms">

    <script>
      const SVG_BASE = "https://raw.githubusercontent.com/egorkalihanov2-create/SVGs/main/";

      const state = {
        shield: "shield-classic",
        color: "#2b5be0",
        stripes: 2,
        animal: "lion",
        text: "Фрейм",
        isMobile: false,
      };

      let currentSection = 0;
      const SECTIONS = ["Форма щита", "Цвет", "Полоски", "Животное", "Текст"];
      let animalPage = 0;

      const SHIELDS = [
        { id: "shield-round", label: "Круглый" },
        { id: "shield-classic", label: "Защип" },
        { id: "shield-modern", label: "Билет" },
      ];

      const COLORS = [
        { hex: "#e8232a", var: "--color-crimson" },
        { hex: "#f5a31b", var: "--color-orange" },
        { hex: "#ff00ed", var: "--color-fuchsia" },
        { hex: "#00ff06", var: "--color-lime" },
        { hex: "#000000", var: "--Toolbars-Color" },
        { hex: "#00c3ff", var: "--color-deepskyblue" },
        { hex: "#ffff00", var: "--color-yellow" },
        { hex: "#6300ff", var: "--color-blue" },
        { hex: "#2b5be0", var: "--First-View-Color" },
      ];

      const ANIMALS = [
        { id: "lion", label: "Лев" },
        { id: "falcon", label: "Сокол" },
        { id: "peacock", label: "Павлин" },
        { id: "camel", label: "Верблюд" },
        { id: "unicorn", label: "Единорог" },
        { id: "bear", label: "Медведь" },
        { id: "dragon", label: "Дракон" },
        { id: "elephant", label: "Слон" },
        { id: "crocodile", label: "Крокодил" },
        { id: "monkey", label: "Обезьяна" },
        { id: "raccoon", label: "Енот" },
        { id: "rooster", label: "Петух" },
        { id: "goatkid", label: "Козлёнок" },
        { id: "kitten", label: "Котёнок" },
      ];

      const ANIMAL_ROWS = [
        ["lion", "falcon", "peacock"],
        ["camel", "unicorn", "bear"],
        ["dragon", "elephant", "crocodile"],
        ["monkey", "raccoon", "rooster"],
        ["goatkid", "kitten"],
      ];

      const svgCache = {};

      async function getSVG(url) {
        if (svgCache[url]) return svgCache[url];
        const res = await fetch(url);
        if (!res.ok) throw new Error("SVG fetch failed: " + url);
        const text = await res.text();
        svgCache[url] = text;
        return text;
      }

      function isWhiteFill(fill) {
        if (!fill || fill === "none") return false;
        const f = fill.toLowerCase().replace(/\s/g, "");
        return f === "#fff" || f === "#ffffff" || f === "white" || f === "rgb(255,255,255)";
      }

      function prepareSvgMarkup(svgText) {
        const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
        const root = doc.documentElement;
        root.querySelectorAll("[fill]").forEach((el) => {
          const fill = el.getAttribute("fill");
          if (isWhiteFill(fill)) {
            el.classList.add("keep-white");
          } else if (fill && fill !== "none") {
            el.classList.add("accent-fill");
            el.removeAttribute("fill");
          }
        });
        root.querySelectorAll("[stroke]").forEach((el) => {
          const stroke = el.getAttribute("stroke");
          if (stroke && !isWhiteFill(stroke) && stroke !== "none") {
            el.classList.add("accent-stroke");
            el.removeAttribute("stroke");
          }
        });
        return root.outerHTML;
      }

      function shieldUrl(id) {
        return SVG_BASE + "assets/shields/" + id + ".svg";
      }

      function animalUrl(id) {
        return SVG_BASE + "assets/animals/" + id + ".svg";
      }

      function stripesUrl(n) {
        const folder = state.isMobile ? "mobile" : "desktop";
        return SVG_BASE + "assets/stripes/" + folder + "/stripes-" + n + ".svg";
      }

      async function loadLayer(layerEl, url) {
  try {
    const raw = await getSVG(url);
    layerEl.innerHTML = prepareSvgMarkup(raw);

    if (layerEl.id.includes("stripes-layer")) {
      const svgNode = layerEl.querySelector("svg");
      if (svgNode) {
        // Оставляем для всех полосок, чтобы они правильно тянулись в ширину
        svgNode.setAttribute("preserveAspectRatio", "none");

        // Хирургическое вмешательство ТОЛЬКО для 2 полосок
        if (state.stripes === 2) {
          // Сносим кривой цельный фон, который прилетел из исходника
          svgNode.innerHTML = ""; 

          // Создаем левую белую половину
          const rectLeft = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rectLeft.setAttribute("x", "0");
          rectLeft.setAttribute("y", "0");
          rectLeft.setAttribute("width", "50%");
          rectLeft.setAttribute("height", "100%");
          rectLeft.setAttribute("fill", "white");
          rectLeft.setAttribute("class", "keep-white");

          // Создаем правую половину (цветную)
          const rectRight = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rectRight.setAttribute("x", "50%");
          rectRight.setAttribute("y", "0");
          rectRight.setAttribute("width", "50%");
          rectRight.setAttribute("height", "100%");
          // Класс accent-fill заставит её подхватить текущий цвет герба
          rectRight.setAttribute("class", "accent-fill");

          svgNode.appendChild(rectLeft);
          svgNode.appendChild(rectRight);
        }
      }
    }
  } catch (e) {
    layerEl.innerHTML = "";
    console.warn(e);
  }
}

      function updateAccentColor() {
        document.documentElement.style.setProperty("--accent-color", state.color);
      }

      function updateStripeIndicator() {
        const el = document.getElementById("stripe-indicator");
        const count = state.stripes;
        const patterns = { 2: ["white", "accent"], 4: ["white", "accent", "white", "accent"], 6: ["white", "accent", "white", "accent", "white", "accent"] };
        const segs = patterns[count] || patterns[2];
        el.innerHTML = segs.map((t) => '<div class="ind-seg ' + t + '"></div>').join("");
      }

      function setActiveButtons(selector, matchAttr, value) {
        document.querySelectorAll(selector).forEach((btn) => {
          btn.classList.toggle("active", btn.getAttribute(matchAttr) === value);
        });
      }

      async function renderCoat() {
        const shieldUrlVal = shieldUrl(state.shield);
        const stripesUrlVal = stripesUrl(state.stripes);
        const animalUrlVal = animalUrl(state.animal);

        const layers = [
          ["shield-layer", "mobile-shield-layer", shieldUrlVal],
          ["stripes-layer", "mobile-stripes-layer", stripesUrlVal],
          ["animal-layer", "mobile-animal-layer", animalUrlVal],
        ];

        await Promise.all(
          layers.map(([desktopId, mobileId, url]) =>
            Promise.all([
              loadLayer(document.getElementById(desktopId), url),
              loadLayer(document.getElementById(mobileId), url),
            ])
          )
        );

        const textDesktop = document.getElementById("text-layer");
        const textMobile = document.getElementById("mobile-text-layer");
        textDesktop.textContent = state.text;
        textMobile.textContent = state.text;

        updateAccentColor();
        updateStripeIndicator();
      }

      function updateUIState() {
        setActiveButtons(".shield-option", "data-shield", state.shield);
        setActiveButtons(".mobile-shield-option", "data-shield", state.shield);
        setActiveButtons(".color-swatch:not(.picker)", "data-color", state.color);
        document.querySelectorAll(".stripe-count").forEach((btn) => {
          btn.classList.toggle("active", Number(btn.dataset.stripes) === state.stripes);
        });
        setActiveButtons(".animal-option", "data-animal", state.animal);
        setActiveButtons(".mobile-animal-option", "data-animal", state.animal);

        document.getElementById("desktop-text-input").value = state.text;
        document.getElementById("mobile-text-input").value = state.text;
        document.getElementById("color-input").value = state.color;
      }

      async function render() {
        updateUIState();
        await renderCoat();
      }

      function randomize() {
        const shields = ["shield-classic", "shield-round", "shield-modern"];
        const animals = ANIMALS.map((a) => a.id);
        const colors = COLORS.map((c) => c.hex);
        const stripes = [2, 4, 6];
        state.shield = shields[Math.floor(Math.random() * shields.length)];
        state.color = colors[Math.floor(Math.random() * colors.length)];
        state.stripes = stripes[Math.floor(Math.random() * stripes.length)];
        state.animal = animals[Math.floor(Math.random() * animals.length)];
        render();
      }

async function exportSVG() {
        const color = state.color;
        const shieldEl = document.getElementById("shield-layer").innerHTML;
        const stripesEl = document.getElementById("stripes-layer").innerHTML;
        const animalEl = document.getElementById("animal-layer").innerHTML;
        const text = state.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // Умная функция встраивания цвета, которая вырезает старые width/height, 
        // чтобы не было конфликта (ошибки "Attribute redefined")
        const inlineAccent = (html, extraAttr = "") => {
          let res = html
            .replace(/class="accent-fill"/g, 'fill="' + color + '"')
            .replace(/class="accent-stroke"/g, 'stroke="' + color + '"');
          
          res = res.replace(/<svg([^>]*)>/i, (match, attrs) => {
            // Удаляем старые атрибуты ширины и высоты из исходного SVG
            let cleanAttrs = attrs.replace(/\b(width|height)=["'][^"']*["']/ig, '');
            return `<svg width="100%" height="100%" ${extraAttr} ${cleanAttrs}>`;
          });
          return res;
        };

        const w = 616;
        const h = 788; 

        const stripesX = (w * 0.104).toFixed(2);
        const stripesY = (h * 0.06).toFixed(2);
        const stripesW = (w * 0.79).toFixed(2);
        
        const animalX = (w / 2 - 410 / 2).toFixed(2); 
        const animalY = (h / 2 - 463 * 0.42).toFixed(2);

        const svg =
          '<?xml version="1.0" encoding="UTF-8"?>\n' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + " " + h + '">\n' +
          "<defs>\n" +
          '<style type="text/css"><![CDATA[\n' +
          "@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');\n" +
          ".keep-white { fill: #ffffff; }\n" + 
          "]]></style>\n" +
          "</defs>\n" +
          
          '<svg x="0" y="0" width="' + w + '" height="' + h + '">' + inlineAccent(shieldEl) + "</svg>\n" +
          '<svg x="' + stripesX + '" y="' + stripesY + '" width="' + stripesW + '" height="30">' + inlineAccent(stripesEl, 'preserveAspectRatio="none"') + "</svg>\n" +
          '<svg x="' + animalX + '" y="' + animalY + '" width="410" height="463">' + inlineAccent(animalEl) + "</svg>\n" +
          '<text x="100" y="165" font-family="Inter, sans-serif" font-size="93" font-weight="500" letter-spacing="-9.3" fill="' + color + '">' + text + "</text>\n" +
          "</svg>";

        const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "coat-of-arms.svg";
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function buildColorSwatches(container, isMobile) {
        COLORS.forEach((c) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "color-swatch";
          btn.style.backgroundColor = c.hex;
          btn.dataset.color = c.hex;
          btn.setAttribute("aria-label", "Цвет " + c.hex);
          btn.addEventListener("click", () => {
            state.color = c.hex;
            render();
          });
          container.appendChild(btn);
        });
        const picker = document.createElement("button");
        picker.type = "button";
        picker.className = "color-swatch picker";
        picker.setAttribute("aria-label", "Выбрать цвет");
        picker.addEventListener("click", () => {
          document.getElementById("color-input").click();
        });
        container.appendChild(picker);
      }

      async function buildShieldOptions(container, extraClass) {
        for (const s of SHIELDS) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "shield-option " + (extraClass || "");
          btn.dataset.shield = s.id;
          const thumb = document.createElement("div");
          thumb.className = "shield-thumb";
          try {
            const raw = await getSVG(shieldUrl(s.id));
            thumb.innerHTML = prepareSvgMarkup(raw);
          } catch (e) {
            thumb.textContent = "?";
          }
          const label = document.createElement("span");
          label.textContent = s.label;
          btn.appendChild(thumb);
          btn.appendChild(label);
          btn.addEventListener("click", () => {
            state.shield = s.id;
            render();
          });
          container.appendChild(btn);
        }
      }
function buildStripePreviews(container, isMobile) {
    container.innerHTML = "";
    container.style.width = "100%"; // Заставляем контейнер растянуться
    
    // Создаем саму полоску
    const previewDiv = document.createElement("div");
    previewDiv.style.width = "100%";
    previewDiv.style.height = "30px";
    previewDiv.style.border = "1px solid #e0e0e0";
    previewDiv.style.display = "flex";
    
    const n = state.stripes;
    
    // Определяем паттерн цветов
    const pattern = n === 2 
        ? ["#fff", "var(--accent-color)"] 
        : n === 4 
        ? ["#fff", "var(--accent-color)", "#fff", "var(--accent-color)"]
        : ["#fff", "var(--accent-color)", "#fff", "var(--accent-color)", "#fff", "var(--accent-color)"];
        
    // Отрисовываем сегменты
    pattern.forEach(col => {
        const seg = document.createElement("span");
        seg.style.flex = "1";
        seg.style.height = "100%";
        seg.style.background = col;
        previewDiv.appendChild(seg);
    });
    
    container.appendChild(previewDiv);

      }

      async function buildAnimalThumb(id) {
        const div = document.createElement("div");
        div.className = "animal-thumb";
        try {
          const raw = await getSVG(animalUrl(id));
          div.innerHTML = prepareSvgMarkup(raw);
        } catch (e) {
          div.textContent = "?";
        }
        return div;
      }

      async function buildDesktopAnimals() {
        const root = document.getElementById("desktop-animals");
        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = "Животное";
        root.appendChild(title);

        for (const row of ANIMAL_ROWS) {
          const rowEl = document.createElement("div");
          rowEl.className = "animal-row " + (row.length < 3 ? "pair" : "");
          
          if (row.length === 2) {
            const inner = document.createElement("div");
            inner.className = "animal-row-inner";
            for (const id of row) {
              // Вот тут мы генерируем кнопку с текстом внутри
              inner.appendChild(await createAnimalOption(id)); 
            }
            rowEl.appendChild(inner);
          } else {
            for (const id of row) {
              rowEl.appendChild(await createAnimalOption(id));
            }
          }
          root.appendChild(rowEl);
        }
      }

      async function createAnimalOption(id, showLabel = true) {
        const a = ANIMALS.find((x) => x.id === id);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "animal-option";
        btn.dataset.animal = id;
        btn.appendChild(await buildAnimalThumb(id));
        if (showLabel) {
          const label = document.createElement("span");
          label.textContent = a.label;
          btn.appendChild(label);
        }
        btn.addEventListener("click", () => {
          state.animal = id;
          render();
        });
        return btn;
      }

      async function renderMobileAnimalPage() {
        const grid = document.getElementById("mobile-animals");
        grid.innerHTML = "";
        const perPage = 3;
        const start = animalPage * perPage;
        const slice = ANIMALS.slice(start, start + perPage);
        for (const a of slice) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "animal-option mobile-animal-option";
          btn.dataset.animal = a.id;
          btn.appendChild(await buildAnimalThumb(a.id));
          const label = document.createElement("span");
          label.textContent = a.label;
          btn.appendChild(label);
          btn.addEventListener("click", () => {
            state.animal = a.id;
            render();
          });
          grid.appendChild(btn);
        }
        updateUIState();
      }

      function showSection(index) {
        currentSection = ((index % SECTIONS.length) + SECTIONS.length) % SECTIONS.length;
        document.querySelectorAll(".mobile-panel").forEach((p) => {
          p.classList.toggle("active", Number(p.dataset.section) === currentSection);
        });
      }

      function checkMobile() {
        const wasMobile = state.isMobile;
        state.isMobile = window.innerWidth < 768;
        if (wasMobile !== state.isMobile) {
          render();
        }
      }

      function initEvents() {
        document.querySelectorAll(".stripe-count").forEach((btn) => {
          btn.addEventListener("click", () => {
            state.stripes = Number(btn.dataset.stripes);
            render();
          });
        });

        document.getElementById("desktop-text-input").addEventListener("input", (e) => {
          state.text = e.target.value;
          document.getElementById("text-layer").textContent = state.text;
          document.getElementById("mobile-text-input").value = state.text;
          document.getElementById("mobile-text-layer").textContent = state.text;
        });

        document.getElementById("mobile-text-input").addEventListener("input", (e) => {
          state.text = e.target.value;
          document.getElementById("text-layer").textContent = state.text;
          document.getElementById("desktop-text-input").value = state.text;
          document.getElementById("mobile-text-layer").textContent = state.text;
        });

        document.getElementById("color-input").addEventListener("input", (e) => {
          state.color = e.target.value;
          render();
        });

        document.getElementById("btn-random").addEventListener("click", randomize);
        document.getElementById("btn-svg").addEventListener("click", exportSVG);

        document.getElementById("btn-prev").addEventListener("click", () => showSection(currentSection - 1));
        document.getElementById("btn-next").addEventListener("click", () => showSection(currentSection + 1));

        document.getElementById("animal-prev").addEventListener("click", () => {
          animalPage = Math.max(0, animalPage - 1);
          renderMobileAnimalPage();
        });
        document.getElementById("animal-next").addEventListener("click", () => {
          animalPage = Math.min(Math.ceil(ANIMALS.length / 3) - 1, animalPage + 1);
          renderMobileAnimalPage();
        });

        window.addEventListener("resize", checkMobile);
      }

// Добавляем наш код для переключения полосок:
    document.querySelectorAll('.stripe-count').forEach(btn => {
        btn.addEventListener('click', (event) => {
            const selectedStripes = parseInt(event.target.dataset.stripes);
            state.stripes = selectedStripes;
            
            updateUIState(); // Делает цифру жирной
            render();        // Обновляет большой щит
            
            // ПЕРЕРИСОВЫВАЕМ ПОЛОСКУ В САЙДБАРЕ
            buildStripePreviews(document.getElementById("desktop-stripe-previews"));
            
            // На всякий случай перерисовываем и в мобильном меню, если оно есть
            const mobilePrev = document.getElementById("mobile-stripe-previews");
            if (mobilePrev) buildStripePreviews(mobilePrev, true);
        });
    });

      async function init() {
        state.isMobile = window.innerWidth < 768;

        buildColorSwatches(document.getElementById("desktop-colors"));
        buildColorSwatches(document.getElementById("mobile-colors"));
        await buildShieldOptions(document.getElementById("desktop-shields"));
        await buildShieldOptions(document.getElementById("mobile-shields"), "mobile-shield-option");
        buildStripePreviews(document.getElementById("desktop-stripe-previews"));
        buildStripePreviews(document.getElementById("mobile-stripe-previews"));
        await buildDesktopAnimals();
        renderMobileAnimalPage();
        initEvents();
        await render();
      }

      init();
    </script>
  </body>
</html>
